# =============================================================================
#  策略：格雷厄姆条件（Benjamin Graham Value Investing）
#  核心思想：寻找低估值、财务稳健、有安全边际的深度价值股
# =============================================================================

# ---------------------------------------------------------------------------
#  universe —— 先缩小选股范围
# ---------------------------------------------------------------------------
universe:
  market: A股                # 只选 A 股市场
  exclude_st: true           # 排除 ST / *ST
  min_listing_days: 365      # 上市满一年

# ---------------------------------------------------------------------------
#  screen —— 两段式：自然语言描述 + 硬约束兜底
# ---------------------------------------------------------------------------
screen:

  # ===== 自然语言描述（给 LLM 翻译成 FilterPlan） =====
  description: |
    以下条件同时满足的 A 股深度价值标的：

    1. 当期股价不应该高于过去3年平均利润的15倍。
    2. 市盈率与价格账面值之比的乘积不应该超过22.5
    3. 过去10年内，每股收益的增长至少要达到三分之一（期初和期末使用三年平均数，如2026年的股票计算26、25、24三年的平均每股收益，和16、15、14年的平均每股收益对比看是否增长1/3）
    4. 至少有20年连续支付股息的记录
    5. 工业企业而言，年销售额不低于60亿人民币；就公用事业企业而言，总资产不低于30亿人民币。
    6. 非st、退市股
    7. 工业企业而言，流动资产至少应该是流动负债的两倍。长期债务不应该超过流动资产净额。公用事业企业，负债不应该超过股权（账面值）的两倍。
    8. 过去10年中，普通股每年都有一定的利润。

    输出要求：
    - display_fields: ["symbol", "name", "current_price", "pe_ttm", "pb", "roe", "dividend_yield", "market_cap"]
    - 不限制数量，符合条件即输出，无需排序

  # ===== 硬约束兜底（给 validate_plan 做安全校验，比自然语言宽松一些留容错） =====
  hard_filters:
    pe_ttm:
      min: 0

# ---------------------------------------------------------------------------
#  review —— 人机协同审查
# ---------------------------------------------------------------------------
review:
  require_confirm: true   # 每只需人工 approve / reject

# ---------------------------------------------------------------------------
#  retry —— LLM 生成 FilterPlan 不合规时的重试策略
# ---------------------------------------------------------------------------
retry:
  max_retries: 3          # 最多重试 3 次
  temperature_inc: 0.1    # 每次重试温度加 0.1，鼓励稍变输出
