# =============================================================================
#  策略：格雷厄姆条件（Benjamin Graham Value Investing）
#  核心思想：寻找低估值、财务稳健、有安全边际的深度价值股
# =============================================================================

# ---------------------------------------------------------------------------
#  universe —— 先缩小选股范围
# ---------------------------------------------------------------------------
universe:
  market: A股                # 只选 A 股市场
  exclude_st: true           # 排除 ST / *ST
  min_listing_days: 365      # 上市满一年

# ---------------------------------------------------------------------------
#  screen —— 两段式：自然语言描述 + 硬约束兜底
# ---------------------------------------------------------------------------
screen:

  # ===== 自然语言描述（给 LLM 翻译成 FilterPlan） =====
  description: |
    以下条件同时满足的 A 股深度价值标的：

    1. pe_ttm 大于 0 且 小于等于 15 —— 市盈率在合理偏低区间，有盈利支撑
    2. pb 大于 0 且 小于 1.5 —— 市净率低，价格接近净资产，有安全边际
    3. roe 大于等于 10% —— 净资产收益率不低于 10%，公司有持续盈利能力
    4. dividend_yield 大于 0 —— 要有现金分红，公司愿意回馈股东
    5. market_cap 大于等于 50e8 —— 总市值不低于 50 亿，保证流动性和抗风险能力

    输出要求：
    - display_fields: ["symbol", "name", "current_price", "pe_ttm", "pb", "roe", "dividend_yield", "market_cap"]
    - 不限制数量，符合条件即输出，无需排序

  # ===== 硬约束兜底（给 validate_plan 做安全校验，比自然语言宽松一些留容错） =====
  hard_filters:
    pe_ttm:
      min: 0
      max: 20           # 自然语言写 15，硬约束留到 40，防止 LLM 翻译偏差
    pb:
      min: 0
      max: 2.0          # 自然语言 1.5 → 硬约束 2.0
    roe:
      min: 5            # 自然语言 10% → 硬约束 5%
    market_cap:
      min: 30e8         # 自然语言 50 亿 → 硬约束 30 亿

# ---------------------------------------------------------------------------
#  review —— 人机协同审查
# ---------------------------------------------------------------------------
review:
  require_confirm: true   # 每只需人工 approve / reject

# ---------------------------------------------------------------------------
#  retry —— LLM 生成 FilterPlan 不合规时的重试策略
# ---------------------------------------------------------------------------
retry:
  max_retries: 3          # 最多重试 3 次
  temperature_inc: 0.1    # 每次重试温度加 0.1，鼓励稍变输出
