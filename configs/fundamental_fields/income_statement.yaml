    label_zh: 归母净利润
    source_keys:
      akshare: 归属于母公司股东的净利润
    dtype: float
    unit: 元
    required: true
    description: 归属于母公司股东的净利润。
  - name: net_profit_excluding_non_recurring
    label_zh: 扣非净利润
    source_keys:
      akshare: 扣除非经常性损益后的净利润
    dtype: float
    unit: 元
    required: false
    description: 扣除非经常性损益后的净利润。
  - name: eps_basic
    label_zh: 基本每股收益
    source_keys:
      akshare: 基本每股收益
    dtype: float
    unit: 元/股
    required: false
    description: 基本口径每股收益。
  - name: eps_diluted
    label_zh: 稀释每股收益
    source_keys:
      akshare: 稀释每股收益
    dtype: float
    unit: 元/股
    required: false
    description: 稀释口径每股收益。

